global:
  resolve_timeout: 5m

route:
  receiver: enterprise-webhook
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: enterprise-webhook
      matchers:
        - severity="critical"
      group_wait: 0s
      repeat_interval: 15m

receivers:
  - name: enterprise-webhook
    webhook_configs:
      - url_file: /run/secrets/bibi_alert_webhook_url
        send_resolved: true
        max_alerts: 100
        timeout: 10s

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: bibi-work-backend
    metrics_path: /internal/metrics
    authorization:
      credentials_file: /run/secrets/bibi_internal_token
    static_configs:
      - targets:
          - host.docker.internal:8361

  - job_name: bibi-work-agent
    metrics_path: /internal/metrics
    authorization:
      credentials_file: /run/secrets/bibi_internal_token
    static_configs:
      - targets:
          - host.docker.internal:8371
